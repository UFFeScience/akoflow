name: Build Base Images

on:
  push:
    branches: [main]
    paths:
      - 'releases/base-images/**'
  workflow_dispatch:

env:
  DOCKER_ORG: akoflow

jobs:
  build:
    name: Base — ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: control-plane
            dockerfile: releases/base-images/control-plane.Dockerfile
            image: akoflow/base-control-plane

          - name: standalone
            dockerfile: releases/base-images/standalone.Dockerfile
            image: akoflow/base-standalone

          - name: workflow-engine
            dockerfile: releases/base-images/workflow-engine.Dockerfile
            image: akoflow/base-workflow-engine

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ matrix.image }}:latest
          cache-from: type=gha,scope=base-${{ matrix.name }}
          cache-to: type=gha,scope=base-${{ matrix.name }},mode=max
